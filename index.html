<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowUp Tools - Dụng Cụ Makeup Chuyên Nghiệp</title>
    <style>
        :root {
            --primary-color: #d87d7d;
            --bg-color: #fff5f5;
            --card-bg: #ffffff;
            --text-color: #444444;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #ffe3e3;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #ffd1d1;
        }
        header h1 {
            margin: 0;
            color: var(--primary-color);
            font-size: 32px;
            letter-spacing: 1px;
        }
        header p {
            margin: 8px 0 0 0;
            color: #777;
            font-style: italic;
        }
        .main-layout {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: var(--card-bg);
            border: 1px solid #ffe3e3;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            text-align: center;
            padding-bottom: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(216,125,125,0.1);
        }
        .product-img {
            width: 100%;
            height: 200px;
            background-color: #fcebeb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d87d7d;
            font-size: 40px;
        }
        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin: 15px 10px 5px 10px;
            color: #333;
        }
        .product-price {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .btn-buy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            width: 80%;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background-color: #c36a6a;
        }
        .cart-sidebar {
            background: var(--card-bg);
            border: 1px solid #ffe3e3;
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            position: sticky;
            top: 20px;
        }
        .cart-sidebar h2 {
            margin-top: 0;
            font-size: 20px;
            color: #333;
            border-bottom: 2px solid #ffe3e3;
            padding-bottom: 10px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .cart-total {
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            border-top: 1px dashed #ffe3e3;
            padding-top: 10px;
            display: flex;
            justify-content: space-between;
        }
        .btn-checkout {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
        }
        .btn-checkout:hover { background-color: #218838; }
    </style>
</head>
<body>

    <header>
        <h1>GlowUp Tools</h1>
        <p>Bộ dụng cụ trang điểm chất lượng cao đồng hành cùng video TikTok của bạn</p>
    </header>

    <div class="main-layout">
        <!-- Danh sách sản phẩm bên trái -->
        <div class="products-grid">
            <div class="product-card">
                <div class="product-img">🖌️</div>
                <div class="product-title">Bộ Cọ Makeup Cá Nhân (5 Món)</div>
                <div class="product-price">250000</div>
                <button class="btn-buy" onclick="addToCart('Bộ Cọ Cá Nhân', 250.000đ)">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-img">🥚</div>
                <div class="product-title">Bông Mút Tán Nền Siêu Mịn</div>
                <div class="product-price">65000</div>
                <button class="btn-buy" onclick="addToCart('Bông Mút Tán Nền', 65.000đ)">Thêm vào giỏ</button>
            </div>

            <div class="product-card">
                <div class="product-img">✂️</div>
                <div class="product-title">Kẹp Mi Góc Rộng Không Đau Mí</div>
                <div class="product-price">85000</div>
                <button class="btn-buy" onclick="addToCart('Kẹp Mi Góc Rộng', 85.000đ)">Thêm vào giỏ</button>
            </div>
        </div>

        <!-- Giỏ hàng tính tiền bên phải -->
        <div class="cart-sidebar">
            <h2>Giỏ hàng của bạn</h2>
            <div id="cart-items">
                <p style="color: #aaa; font-style: italic;">Chưa có sản phẩm nào.</p>
            </div>
            <div class="cart-total">
                <span>Tổng tiền:</span>
                <span id="total-price">0 đ</span>
            </div>
            <button class="btn-checkout" onclick="checkout()">Thanh Toán Ngay</button>
        </div>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            updateCart();
        }

        function updateCart() {
            const cartItemsDiv = document.getElementById('cart-items');
            const totalPriceSpan = document.getElementById('total-price');
            
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p style="color: #aaa; font-style: italic;">Chưa có sản phẩm nào.</p>';
                totalPriceSpan.innerText = '0 đ';
                return;
            }

            cartItemsDiv.innerHTML = '';
            total = 0;
            
            cart.forEach(item => {
                total += item.price;
                cartItemsDiv.innerHTML += `
                    <div class="cart-item">
                        <span>${item.name}</span>
                        <span>${item.price.toLocaleString('vi-VN')} đ</span>
                    </div>
                `;
            });

            totalPriceSpan.innerText = total.toLocaleString('vi-VN') + ' đ';
        }

        function checkout() {
            if(cart.length === 0) {
                alert('Giỏ hàng của bạn đang trống!');
                return;
            }
            alert('Cảm ơn bạn! Tổng số tiền cần thanh toán là: ' + total.toLocaleString('vi-VN') + ' đ. Chức năng kết nối ngân hàng/QR code đang được chuẩn bị lập trình.');
        }
    </script>
</body>
</html>
